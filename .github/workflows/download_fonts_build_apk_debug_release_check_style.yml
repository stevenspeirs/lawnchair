name: Download Fonts Build APK Debug Release Check Style

on:
  workflow_dispatch:

jobs:
  download-fonts:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v5
      - name: Download
        run: |
          url='https://www.googleapis.com/webfonts/v1/webfonts?key=${{ secrets.GOOGLE_FONTS_API }}'
          output='lawnchair/assets/google_fonts.json'
          mkdir -p lawnchair/assets
          curl -o $output $url || exit 1
      - name: Checksum
        run: |
          output='lawnchair/assets/google_fonts.json'
          if [ -f $output ]; then
            old_checksum=$(git show HEAD:$output | sha256sum | awk '{print $1}')
            new_checksum=$(sha256sum $output | awk '{print $1}')
            if [ $old_checksum == $new_checksum ]; then
              echo 'checksum_match=true' >> $GITHUB_ENV
            else
              echo 'checksum_match=false' >> $GITHUB_ENV
            fi
          else
            echo 'checksum_match=false' >> $GITHUB_ENV
          fi
      - name: Commit
        run: |
          if [ '${{ env.checksum_match }}' == 'false' ]; then
            git config --global user.name 'GitHub Action'
            git config --global user.email 'action@github.com'
            git add lawnchair/assets/google_fonts.json
            git commit -m 'Update Google fonts'
            git push
          fi
  build-apk:
    runs-on: ubuntu-latest
    needs: download-fonts
    steps:
      - name: Time
        run: echo time=$(date +'%s') >> $GITHUB_ENV
      - name: Checkout
        uses: actions/checkout@v5
        with:
          submodules: true
      - name: Java
        uses: actions/setup-java@v5
        with:
          distribution: zulu
          java-version: 24
      - name: Gradle
        uses: gradle/actions/setup-gradle@v5
        with:
          cache-cleanup: always
      - name: Sign
        if: github.repository_owner == 'tgex0'
        run: |
          if [ ! -z '${{ secrets.KEYSTORE }}' ]; then
            echo storePassword='${{ secrets.KEYSTORE_PASSWORD }}' >> keystore.properties
            echo keyAlias='${{ secrets.KEY_ALIAS }}' >> keystore.properties
            echo keyPassword='${{ secrets.KEY_PASSWORD }}' >> keystore.properties
            echo storeFile='${{ github.workspace }}/keystore.jks' >> keystore.properties
            echo ${{ secrets.KEYSTORE }} | base64 --decode > ${{ github.workspace }}/keystore.jks
          fi
      - name: Build
        run: ./gradlew assembleLawnWithQuickstepGithubDebug assembleLawnWithQuickstepGithubRelease
      - name: Upload
        uses: actions/upload-artifact@v4
        with:
          name: lawnchair-${{ env.time }}
          path: build/outputs/apk/lawnWithQuickstepGithub/*/*.apk
  check-style:
    runs-on: ubuntu-latest
    needs: download-fonts
    steps:
      - name: Checkout
        uses: actions/checkout@v5
        with:
          submodules: true
      - name: Java
        uses: actions/setup-java@v5
        with:
          distribution: zulu
          java-version: 24
      - name: Gradle
        uses: gradle/actions/setup-gradle@v5
      - name: Spotless
        run: ./gradlew spotlessCheck
